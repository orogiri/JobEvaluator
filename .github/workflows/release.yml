name: Release

# Runs automatically whenever package.json changes on master (i.e. a version
# bump), and can also be triggered manually from the Actions tab. Publishes
# using GitHub's own built-in token for this repo — no personal access token
# needed, ever.
on:
  push:
    branches: [master]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version
        id: pkg
        shell: pwsh
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Skip if this version was already released
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "v${{ steps.pkg.outputs.version }}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm run install:all

      - name: Build and publish release
        if: steps.check.outputs.skip == 'false'
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
