name: Release

# Runs automatically whenever package.json changes on master (i.e. a version
# bump), and can also be triggered manually from the Actions tab. Publishes
# using GitHub's own built-in token for this repo — no personal access token
# needed, ever.
on:
  push:
    branches: [master]
    paths: ['package.json']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version
        id: pkg
        shell: pwsh
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Skip if this version was already released
        id: check
        shell: pwsh
        run: |
          $tag = "v${{ steps.pkg.outputs.version }}"
          try {
            Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -ErrorAction Stop | Out-Null
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } catch {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Disable Windows Defender real-time scanning
        # NSIS (the installer builder) writes and executes many small files in
        # quick succession, which Defender's real-time scanning on GitHub's
        # Windows runners can stall on for many minutes. Safe here since this
        # VM is discarded immediately after the job finishes.
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm run install:all

      - name: Build and publish release
        if: steps.check.outputs.skip == 'false'
        timeout-minutes: 12
        run: npm run electron:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
